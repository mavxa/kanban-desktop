name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""

          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: build tauri app
        run: bun run tauri:build -- ${{ matrix.args }}

      - name: upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: error

  publish-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: create draft release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_id="$(
            gh api "repos/${REPO}/releases" \
              --paginate \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | .id" \
              | head -n 1
          )"

          if [ -z "$release_id" ]; then
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --draft \
              --title "kanban-desktop ${TAG_NAME}" \
              --notes "Release for ${TAG_NAME}"
          fi

          mapfile -d '' assets < <(find release-assets -type f -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${assets[@]}" --repo "$REPO" --clobber
